<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Reset Password</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,sans-serif;background:#F7F8FA;display:flex;justify-content:center;align-items:center;min-height:100vh}
.card{background:#FFF;border-radius:16px;padding:40px;max-width:420px;width:90%;text-align:center;box-shadow:0 2px 12px rgba(0,0,0,.06)}
h1{font-size:22px;color:#0F172A;margin-bottom:12px}
p{font-size:14px;color:#64748B;line-height:22px;margin-bottom:24px}
.btn{display:block;background:#0F172A;color:#FFF;font-size:16px;font-weight:700;padding:14px 48px;border-radius:12px;border:none;cursor:pointer;text-decoration:none;margin:0 auto 12px;width:fit-content}
.btn2{display:block;background:transparent;color:#3B82F6;font-size:14px;font-weight:600;padding:10px;border-radius:12px;border:1.5px solid #3B82F6;cursor:pointer;text-decoration:none;margin:0 auto;width:fit-content}
.msg{color:#94A3B8;font-size:13px;margin-top:16px}
.err{color:#E63946;font-size:13px;margin-top:16px}
a{color:#3B82F6}
</style>
</head>
<body>
<div class="card">
<h1>مودة فون</h1>
<p>إعادة تعيين كلمة المرور</p>
<div id="app">
<a class="btn" id="openBtn" href="#">فتح التطبيق</a>
<a class="btn2" id="retryBtn" href="#">إعادة المحاولة</a>
<p class="msg" id="status"></p>
</div>
</div>
<script>
(function(){
var h=location.hash.substring(1)||location.search.substring(1);
var p=new URLSearchParams(h);
var at=p.get("access_token");
var rt=p.get("refresh_token");
if(!at||!rt){
document.getElementById("app").innerHTML="<p class=err>رابط غير صالح</p>";
return;
}
var dl="mawada://reset-password#access_token="+at+"&refresh_token="+rt;
var btn=document.getElementById("openBtn");
var retry=document.getElementById("retryBtn");
btn.href=dl;
retry.href=dl;
document.getElementById("status").innerHTML="اضغط الزر لفتح التطبيق واستعادة كلمة المرور";
function tryRedirect(){
try{window.location.replace(dl)}catch(e){}
try{window.location.href=dl}catch(e){}
}
setTimeout(tryRedirect,300);
})();
</script>
</body>
</html>
